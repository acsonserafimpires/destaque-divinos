<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Destaque Divino</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial;
}

.fade{
animation:fade .3s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl overflow-hidden">

<div class="bg-gradient-to-r from-blue-700 to-blue-500 text-white p-5">

<h1 class="text-3xl font-bold">
🏆 Destaque Divino
</h1>

<p class="opacity-90 mt-1">
Vote nas melhores empresas
</p>

</div>

<div id="app"></div>

<div class="text-center py-5 text-xs text-gray-400">

© 2026 Destaque Divino

<div class="mt-2">
<button onclick="admin()">
ADN
</button>
</div>

</div>

</div>

<script>

const categorias = [
{
nome:"Padarias",
icon:"🥖",
empresas:[
"Padaria Central",
"Pão Mineiro",
"Delícias do Trigo"
]
},

{
nome:"Mercados",
icon:"🛒",
empresas:[
"Mercado Silva",
"Super Econômico",
"Mercadinho Divino"
]
},

{
nome:"Autoescolas",
icon:"🏍️",
empresas:[
"Autoescola Divisias",
"Autoescola Central"
]
}
];

let categoriaAtual=0;
let votos=[];

function home(){

document.getElementById("app").innerHTML=`

<div class="p-4 fade">

<div class="bg-gradient-to-r from-orange-500 to-yellow-400 rounded-3xl p-5 text-white shadow-xl mb-5">

<div class="text-sm uppercase opacity-90 mb-1">
Premiação Oficial
</div>

<h2 class="text-3xl font-bold mb-3">
As empresas mais lembradas da cidade
</h2>

<button
onclick="email()"
class="bg-white text-orange-600 w-full py-4 rounded-2xl font-bold">
COMEÇAR VOTAÇÃO
</button>

</div>

<div class="grid gap-4">

<button
onclick="ranking()"
class="bg-white rounded-3xl p-5 shadow text-left">

<div class="text-xl font-bold mb-1">
🏆 Ranking Parcial
</div>

<div class="text-gray-500 text-sm">
Veja as empresas mais votadas
</div>

</button>

<button
onclick="cadastroEmpresa()"
class="bg-white rounded-3xl p-5 shadow text-left">

<div class="text-xl font-bold mb-1">
🏢 Cadastrar Empresa
</div>

<div class="text-gray-500 text-sm">
Participe da premiação
</div>

</button>

</div>

</div>
`;
}

function email(){

document.getElementById("app").innerHTML=`

<div class="p-5 fade">

<button
onclick="home()"
class="mb-5 text-blue-600">
← Voltar
</button>

<div class="text-center mb-6">

<div class="text-6xl mb-4">
✉️
</div>

<h2 class="text-3xl font-bold mb-2">
Informe seu e-mail
</h2>

</div>

<input
id="email"
type="email"
placeholder="Digite seu e-mail"
class="w-full border rounded-2xl p-4 mb-5">

<button
onclick="votacao()"
class="bg-blue-600 text-white w-full py-4 rounded-2xl font-bold">
CONTINUAR
</button>

</div>
`;
}

function votacao(){

abrirCategoria();
}

function abrirCategoria(){

const categoria=categorias[categoriaAtual];

document.getElementById("app").innerHTML=`

<div class="p-4 fade">

<div class="flex justify-between items-center mb-5">

<div>

<div class="text-sm text-gray-500">
Categoria ${categoriaAtual+1} de ${categorias.length}
</div>

<h2 class="text-3xl font-bold mt-1">
${categoria.icon} ${categoria.nome}
</h2>

</div>

</div>

<div class="space-y-4">

${categoria.empresas.map(empresa=>`

<div class="bg-white border rounded-3xl p-4 shadow">

<div class="flex justify-between items-center gap-3">

<div>

<div class="font-bold text-lg">
${empresa}
</div>

<div class="text-sm text-gray-500">
Empresa participante
</div>

</div>

<button
onclick="votar('${empresa}')"
class="bg-green-500 text-white px-5 py-3 rounded-2xl font-bold">
VOTAR
</button>

</div>

</div>

`).join('')}

</div>

</div>
`;
}

function votar(empresa){

votos.push({
categoria:categorias[categoriaAtual].nome,
empresa
});

categoriaAtual++;

if(categoriaAtual>=categorias.length){

final();

return;
}

abrirCategoria();
}

function final(){

document.getElementById("app").innerHTML=`

<div class="p-5 text-center fade">

<div class="text-7xl mb-5">
🎉
</div>

<h2 class="text-4xl font-bold mb-3">
Obrigado por votar!
</h2>

<p class="text-gray-500 mb-6">
Sua participação foi registrada.
</p>

<button
onclick="home()"
class="bg-blue-600 text-white w-full py-4 rounded-2xl font-bold">
VOLTAR AO INÍCIO
</button>

</div>
`;
}

function ranking(){

document.getElementById("app").innerHTML=`

<div class="p-5 fade">

<button
onclick="home()"
class="mb-5 text-blue-600">
← Voltar
</button>

<h2 class="text-3xl font-bold mb-5">
🏆 Ranking Parcial
</h2>

<div class="space-y-4">

<div class="bg-yellow-100 p-4 rounded-3xl">
🥇 Mercado Silva
</div>

<div class="bg-gray-100 p-4 rounded-3xl">
🥈 Padaria Central
</div>

<div class="bg-orange-100 p-4 rounded-3xl">
🥉 Autoescola Divisias
</div>

</div>

</div>
`;
}

function cadastroEmpresa(){

document.getElementById("app").innerHTML=`

<div class="p-5 fade">

<button
onclick="home()"
class="mb-5 text-blue-600">
← Voltar
</button>

<h2 class="text-3xl font-bold mb-5">
🏢 Cadastro Empresa
</h2>

<div class="space-y-4">

<input
placeholder="Nome da empresa"
class="w-full border rounded-2xl p-4">

<input
placeholder="Responsável"
class="w-full border rounded-2xl p-4">

<input
placeholder="Telefone"
class="w-full border rounded-2xl p-4">

<input
placeholder="E-mail"
class="w-full border rounded-2xl p-4">

<select
class="w-full border rounded-2xl p-4">

<option>
Selecione categoria
</option>

<option>
Padarias
</option>

<option>
Mercados
</option>

<option>
Autoescolas
</option>

</select>

<button
class="bg-green-500 text-white w-full py-4 rounded-2xl font-bold">
ENVIAR CADASTRO
</button>

</div>

</div>
`;
}

function admin(){

const senha=prompt("Senha administrador");

if(senha==="1234"){

document.getElementById("app").innerHTML=`

<div class="p-5 fade">

<h2 class="text-3xl font-bold mb-5">
⚙️ Painel Admin
</h2>

<div class="grid grid-cols-2 gap-4 mb-5">

<div class="bg-blue-100 p-4 rounded-3xl">
<div class="text-3xl font-bold">
23
</div>

<div class="text-sm">
Votos
</div>
</div>

<div class="bg-green-100 p-4 rounded-3xl">
<div class="text-3xl font-bold">
12
</div>

<div class="text-sm">
Empresas
</div>
</div>

</div>

<div class="space-y-4">

<button class="w-full bg-blue-600 text-white p-4 rounded-2xl">
Gerenciar Empresas
</button>

<button class="w-full bg-orange-500 text-white p-4 rounded-2xl">
Categorias
</button>

<button class="w-full bg-purple-500 text-white p-4 rounded-2xl">
Banners
</button>

</div>

</div>
`;

}else{

alert("Senha incorreta");

}

}

home();

</script>

</body>
</html>
