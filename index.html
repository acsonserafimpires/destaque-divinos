<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destaque Divino</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto min-h-screen bg-white shadow-xl">

  <div class="bg-blue-600 text-white p-5">
    <h1 class="text-2xl font-bold">
      Destaque Divino
    </h1>

    <p class="text-sm opacity-90">
      Vote nas melhores empresas da cidade
    </p>
  </div>

  <div class="p-4">

    <div class="bg-orange-500 rounded-3xl p-5 text-white mb-5">
      <h2 class="text-2xl font-bold mb-2">
        Premiação Oficial 2026
      </h2>

      <p class="mb-4">
        Escolha as melhores empresas da cidade.
      </p>

      <button
        class="bg-white text-orange-600 px-5 py-3 rounded-2xl font-bold w-full">
        COMEÇAR VOTAÇÃO
      </button>
    </div>

    <div class="space-y-4">

      <div class="bg-white rounded-2xl shadow p-4 border">
        <div class="flex justify-between items-center">

          <div>
            <h3 class="font-bold text-lg">
              🥖 Padarias
            </h3>

            <p class="text-gray-500 text-sm">
              Vote na melhor padaria
            </p>
          </div>

          <button
            class="bg-green-500 text-white px-4 py-2 rounded-xl">
            Entrar
          </button>

        </div>
      </div>

      <div class="bg-white rounded-2xl shadow p-4 border">
        <div class="flex justify-between items-center">

          <div>
            <h3 class="font-bold text-lg">
              🛒 Mercados
            </h3>

            <p class="text-gray-500 text-sm">
              Vote no melhor mercado
            </p>
          </div>

          <button
            class="bg-green-500 text-white px-4 py-2 rounded-xl">
            Entrar
          </button>

        </div>
      </div>

    </div>

  </div>

</div>

</body>
</html>
